/* ══════════════════════════════════════════════════════
   CROSS-TAB SYNC ENGINE
   Uses BroadcastChannel (real-time) + localStorage (persistence)
   Any tab that changes orders/drivers/inventory will instantly
   push the update to all other open tabs.
══════════════════════════════════════════════════════ */
function useSharedState(key, initial) {
  const lsKey = "biltizo_" + key;
  const bcRef = useRef(null);
  const selfUpdate = useRef(false);

  const load = () => {
    try {
      const raw = localStorage.getItem(lsKey);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  };

  const [state, setStateRaw] = useState(() => load() ?? initial);

  useEffect(() => {
    // BroadcastChannel: receive updates from other tabs
    const bc = new BroadcastChannel("biltizo_sync_" + key);
    bcRef.current = bc;
    bc.onmessage = (e) => {
      if (e.data && e.data.type === "sync") {
        selfUpdate.current = true;
        setStateRaw(e.data.value);
        selfUpdate.current = false;
      }
    };
    // Also listen to storage events (fallback for older browsers)
    const onStorage = (e) => {
      if (e.key === lsKey && e.newValue) {
        try {
          const v = JSON.parse(e.newValue);
          selfUpdate.current = true;
          setStateRaw(v);
          selfUpdate.current = false;
        } catch(err) {}
      }
    };
    window.addEventListener("storage", onStorage);
    return () => { bc.close(); window.removeEventListener("storage", onStorage); };
  }, [key]);

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      // Save to localStorage
      try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch(e) {}
      // Broadcast to other tabs
      if (bcRef.current) {
        try { bcRef.current.postMessage({ type: "sync", value: next }); } catch(e) {}
      }
      return next;
    });
  }, [key]);

  return [state, setState];
}

// Sync indicator: shows a pulsing dot when a sync event was received
function useSyncFlash() {
  const [flash, setFlash] = useState(false);
  const trigger = () => { setFlash(true); setTimeout(() => setFlash(false), 1500); };
  return [flash, trigger];
}

function useGeo(){
  const[geo,setGeo]=useState({lat:26.8467,lng:80.9462,label:"Hazratganj, Lucknow"});
  useEffect(()=>{
    if(!navigator.geolocation)return;
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      setGeo(g=>({...g,lat,lng,label:"Your Live Location"}));
      fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json")
        .then(r=>r.json()).then(d=>{
          const a=d.address||{};
          const label=[a.suburb||a.neighbourhood,a.city||a.town].filter(Boolean).join(", ");
          if(label)setGeo(g=>({...g,label}));
        }).catch(()=>{});
    },()=>{},{enableHighAccuracy:true,timeout:8000});
  },[]);
  return geo;
}

/* ══ LEAFLET MAP ══ */
function LMap({id,center,zoom,markers,route,onClickMap,height,dark}){
  zoom=zoom||13;markers=markers||[];route=route||[];height=height||260;dark=dark||false;
  const ref=useRef(null);const mapRef=useRef(null);const mRef=useRef([]);const rRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||mapRef.current)return;
    const L=window.L;
    const map=L.map(ref.current,{zoomControl:true}).setView([center.lat,center.lng],zoom);
    L.tileLayer(dark?"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png":"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"OSM | Biltizo"}).addTo(map);
    if(onClickMap)map.on("click",e=>onClickMap({lat:e.latlng.lat,lng:e.latlng.lng}));
    mapRef.current=map;
    return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[]);
  useEffect(()=>{if(mapRef.current)mapRef.current.setView([center.lat,center.lng],zoom,{animate:true});},[center.lat,center.lng]);
  useEffect(()=>{
    if(!mapRef.current||!window.L)return;
    const L=window.L;
    mRef.current.forEach(m=>m.remove());mRef.current=[];
    markers.forEach(m=>{
      const sz=m.sz||36;
      const icon=L.divIcon({html:"<div style=\"background:"+m.color+";width:"+sz+"px;height:"+sz+"px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 3px 12px rgba(0,0,0,.3)\"><span style=\"transform:rotate(45deg);font-size:"+Math.round(sz*.44)+"px;line-height:1\">"+m.icon+"</span></div>",iconSize:[sz,sz],iconAnchor:[sz/2,sz],className:""});
      const mk=L.marker([m.lat,m.lng],{icon}).addTo(mapRef.current).bindPopup("<b style=\"font-size:13px\">"+m.title+"</b><br/><span style=\"font-size:11px;color:#5f7a75\">"+(m.sub||"")+"</span>");
      if(m.open)mk.openPopup();
      mRef.current.push(mk);
    });
  },[JSON.stringify(markers)]);
  useEffect(()=>{
    if(!mapRef.current||!window.L)return;
    if(rRef.current){rRef.current.remove();rRef.current=null;}
    if(route.length>=2)rRef.current=window.L.polyline(route.map(p=>[p.lat,p.lng]),{color:"#f59e0b",weight:4,dashArray:"12 8",opacity:.9}).addTo(mapRef.current);
  },[JSON.stringify(route)]);
  return(
    <div style={{borderRadius:14,overflow:"hidden",border:"1.5px solid "+C.border}}>
      <div ref={ref} style={{height,width:"100%"}}/>
      {onClickMap&&<div style={{textAlign:"center",background:C.teal,color:"#fff",fontSize:11,padding:"4px",fontWeight:600}}>Tap map to set delivery pin</div>}
    </div>
  );
}
function TrackMap({wh,driver,dest,height}){
  height=height||280;
  const[pos,setPos]=useState({lat:driver.lat,lng:driver.lng});
  const tick=useRef(0);
  useEffect(()=>{
    tick.current=0;setPos({lat:driver.lat,lng:driver.lng});
    const iv=setInterval(()=>{tick.current++;const p=Math.min(tick.current/80,1);setPos({lat:driver.lat+(dest.lat-driver.lat)*p,lng:driver.lng+(dest.lng-driver.lng)*p});if(p>=1)clearInterval(iv);},700);
    return()=>clearInterval(iv);
  },[driver.id,dest.lat,dest.lng]);
  const km=((1-Math.min(tick.current/80,1))*4+.5).toFixed(1);
  return <LMap id={"tm"+driver.id} center={pos} zoom={13} height={height}
    markers={[
      {lat:wh.lat,lng:wh.lng,icon:"🏭",color:"#f59e0b",sz:38,title:"Biltizo Warehouse",sub:"Order dispatched here"},
      {lat:pos.lat,lng:pos.lng,icon:driver.icon||"🚛",color:C.teal,sz:40,title:driver.name+" (Driver)",sub:km+" km away",open:true},
      {lat:dest.lat,lng:dest.lng,icon:"📍",color:C.green,sz:36,title:"Delivery Location"}
    ]}
    route={[wh,pos,dest]}/>;
}

/* ══ CART ══ */
function CartDrawer({cart,addCart,onClose,onCheckout,mob}){
  const[coupon,setCoupon]=useState("");const[applied,setApplied]=useState(null);const[couErr,setCouErr]=useState("");
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const disc=applied?Math.floor(sub*applied.disc):0;
  const deliv=sub-disc>=5000?0:299;const total=sub-disc+deliv;
  const applyCode=()=>{
    const o=OFFERS.find(o=>o.code===coupon.trim().toUpperCase());
    if(!o){setCouErr("Invalid code");setApplied(null);return;}
    if(sub<o.min){setCouErr("Min "+fmt(o.min)+" required");setApplied(null);return;}
    setApplied(o);setCouErr("");
  };
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:mob?"column":"row"}}>
      <div onClick={onClose} style={{flex:1,background:"rgba(13,41,38,.55)",backdropFilter:"blur(4px)"}}/>
      <div className="su" style={{width:mob?"100%":390,maxHeight:mob?"92vh":"100vh",background:C.card,borderTop:mob?"3px solid "+C.teal:"none",borderLeft:mob?"none":"2px solid "+C.border,borderRadius:mob?"22px 22px 0 0":0,display:"flex",flexDirection:"column",overflow:"hidden",paddingBottom:mob?"env(safe-area-inset-bottom, 0px)":"0"}}>
        {mob&&<div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"10px auto 0"}}/>}
        <div style={{padding:mob?"12px 18px 10px":"16px 18px 12px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <b style={{color:C.text,fontSize:mob?15:17,fontFamily:"'Oswald',sans-serif"}}>🛒 Cart ({cart.length})</b>
          <button onClick={onClose} style={{background:C.tealL,border:"none",color:C.teal,fontSize:14,cursor:"pointer",borderRadius:8,padding:"6px 12px",fontWeight:700,minHeight:34}}>✕ Close</button>
        </div>
        {cart.length===0
          ?<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,color:C.light,padding:40}}>
            <div style={{fontSize:52}}>🧱</div><div style={{fontSize:16,fontWeight:700}}>Cart is empty</div>
            <button onClick={onClose} style={{background:C.teal,color:"#fff",border:"none",borderRadius:10,padding:"8px 18px",cursor:"pointer",fontWeight:700}}>Browse</button>
          </div>
          :<>
            <div style={{flex:1,overflowY:"auto",padding:"10px 16px"}}>
              {cart.map(item=>(
                <div key={item.id} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:"1px solid "+C.border,alignItems:"center"}}>
                  <div style={{width:42,height:42,background:C.tealL,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{item.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:C.text,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                    <div style={{color:C.amber,fontSize:13,fontWeight:800}}>{fmt(item.price)}<span style={{color:C.light,fontSize:10,fontWeight:400}}>/{item.unit}</span></div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                      <button onClick={()=>addCart(item,-1)} style={{background:C.tealL,color:C.teal,border:"none",borderRadius:6,width:mob?34:25,height:mob?34:25,fontSize:15,cursor:"pointer",fontWeight:700}}>-</button>
                      <span style={{color:C.text,fontWeight:800,fontSize:14,minWidth:14,textAlign:"center"}}>{item.qty}</span>
                      <button onClick={()=>addCart(item,1)} style={{background:C.teal,color:"#fff",border:"none",borderRadius:6,width:mob?34:25,height:mob?34:25,fontSize:15,cursor:"pointer",fontWeight:700}}>+</button>
                    </div>
                  </div>
                  <b style={{color:C.text,fontSize:13,flexShrink:0}}>{fmt(item.price*item.qty)}</b>
                </div>
              ))}
              <div style={{marginTop:14,background:C.tealL,borderRadius:12,padding:12}}>
                <div style={{color:C.teal,fontWeight:700,fontSize:13,marginBottom:8}}>Coupon Code</div>
                <div style={{display:"flex",gap:8}}>
                  <input value={coupon} onChange={e=>setCoupon(e.target.value)} placeholder="Enter code" style={{flex:1,background:"#fff",border:"1.5px solid "+C.border,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.text,outline:"none"}}/>
                  <button onClick={applyCode} style={{background:C.teal,color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Apply</button>
                </div>
                {couErr&&<div style={{color:C.red,fontSize:11,marginTop:4}}>{couErr}</div>}
                {applied&&<div style={{color:C.green,fontSize:11,marginTop:4}}>Applied: {applied.label}</div>}
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                  {OFFERS.map(o=><span key={o.code} onClick={()=>{setCoupon(o.code);setCouErr("");}} style={{background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"3px 8px",fontSize:10,cursor:"pointer",color:C.teal,fontWeight:600}}>{o.code}</span>)}
                </div>
              </div>
            </div>
            <div style={{padding:"12px 16px",borderTop:"1px solid "+C.border}}>
              {[["Subtotal",fmt(sub),""],["Discount",disc>0?"-"+fmt(disc):"--",disc>0?C.green:""],["Delivery",deliv===0?"FREE":fmt(deliv),deliv===0?C.green:""]].map(([l,v,col])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}><span style={{color:C.muted}}>{l}</span><span style={{color:col||C.text}}>{v}</span></div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",color:C.text,fontWeight:800,fontSize:17,margin:"8px 0 14px",borderTop:"1px dashed "+C.border,paddingTop:8}}>
                <span>Total</span><span style={{color:C.amberD}}>{fmt(total)}</span>
              </div>
              <button onClick={onCheckout} style={{width:"100%",background:C.teal,color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 16px "+C.teal+"44"}}>Checkout</button>
            </div>
          </>}
      </div>
    </div>
  );
}

/* ══ ASSIGN DRIVER MODAL ══ */
function AssignModal({order,drivers,onAssign,onClose,warehousePt,mob}){
  const[sel,setSel]=useState("");
  const avail=drivers.filter(d=>d.status==="available");
  const dest=order.delivCoords||{lat:26.8571,lng:80.9903};
  const selD=drivers.find(d=>d.id===sel);
  const mks=[
    {lat:warehousePt.lat,lng:warehousePt.lng,icon:"🏭",color:"#f59e0b",sz:36,title:"Warehouse"},
    {lat:dest.lat,lng:dest.lng,icon:"📍",color:C.green,sz:34,title:"Deliver to: "+order.customerName,sub:order.deliveryAddress,open:true},
    ...avail.map(d=>({lat:d.lat,lng:d.lng,icon:d.icon,color:sel===d.id?C.teal:"#1d4ed8",sz:sel===d.id?38:28,title:d.name,sub:d.vehicle}))
  ];
  const route=selD?[{lat:warehousePt.lat,lng:warehousePt.lng},{lat:selD.lat,lng:selD.lng},dest]:[];
  return(
    <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:mob?"flex-end":"center",justifyContent:"center",padding:mob?0:16}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.75)",backdropFilter:"blur(4px)"}}/>
      <div className="su" style={{width:mob?"100%":500,maxHeight:mob?"92vh":"88vh",background:C.whCard,borderRadius:mob?"20px 20px 0 0":20,padding:20,border:"1px solid "+C.whBorder,position:"relative",zIndex:1,overflowY:"auto"}}>
        <h3 style={{color:C.tealM,fontFamily:"'Oswald',sans-serif",margin:"0 0 4px",fontSize:20}}>Assign Driver</h3>
        <div style={{color:C.whMuted,fontSize:13,marginBottom:14}}>{order.id} - {order.customerName} - {order.deliveryAddress}</div>
        <LMap id={"am"+order.id} center={warehousePt} zoom={12} markers={mks} route={route} height={200} dark={true}/>
        {avail.length===0&&<div style={{color:"#f87171",background:"#7c2d1244",borderRadius:10,padding:12,marginTop:12,fontSize:13}}>No drivers available right now.</div>}
        <div style={{marginTop:14}}>
          {avail.map(d=>(
            <div key={d.id} onClick={()=>setSel(d.id)} style={{background:C.wh,border:"2px solid "+(sel===d.id?C.teal:C.whBorder),borderRadius:12,padding:"12px 14px",marginBottom:10,cursor:"pointer",display:"flex",gap:12,alignItems:"center",transition:"border-color .15s"}}>
              <span style={{fontSize:28}}>{d.icon}</span>
              <div style={{flex:1}}><b style={{color:C.tealM}}>{d.name}</b><div style={{color:C.whMuted,fontSize:12}}>{d.vehicle} - {d.vno}</div><div style={{color:"#2d5a55",fontSize:11}}>Tel: {d.phone} | Rating: {d.rating} | Trips: {d.trips}</div></div>
              <Tag label="Available" color={C.green}/>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button onClick={onClose} style={{flex:1,background:C.wh,color:C.whMuted,border:"1px solid "+C.whBorder,borderRadius:10,padding:12,fontSize:14,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(sel)onAssign(order.id,sel);}} disabled={!sel} style={{flex:2,background:sel?C.teal:"#1c3532",color:sel?"#fff":"#2d5a55",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,cursor:sel?"pointer":"not-allowed"}}>
            Assign and Dispatch
          </button>
        </div>
      </div>
    </div>
  );
}

          <div key={l} style={{marginBottom:14}}>
            <label style={{color:C.whMuted,fontSize:11,fontWeight:700,display:"block",marginBottom:5,letterSpacing:1}}>{l}</label>
            <input type={t} placeholder={ph2} value={v} onChange={e=>s(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={{width:"100%",background:C.wh,border:"1.5px solid "+C.whBorder,borderRadius:10,padding:"13px 14px",color:C.tealM,fontSize:16,outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}
        {err&&<div style={{color:"#f87171",fontSize:12,marginBottom:8}}>Wrong phone/PIN. Try 9876543210 + 1234</div>}
        <div style={{color:"#1e4a44",fontSize:11,marginBottom:14}}>Demo: 9876543210 / 1234 (all drivers share PIN 1234)</div>
        <button onClick={go} style={{width:"100%",background:C.teal,color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:800,cursor:"pointer"}}>Login as Driver</button>
      </div>
    </div>
  );
}

function DriverDash({driver,orders,warehousePt,onDelivered,onLogout,mob,syncFlash}){
  const[online,setOnline]=useState(true);const[tab,setTab]=useState("orders");
  const myOrders=orders.filter(o=>o.driverId===driver.id);
  const active=myOrders.filter(o=>o.status!=="Delivered"&&o.status!=="Pending");
  const done=myOrders.filter(o=>o.status==="Delivered");
  const earnings=done.reduce((s,o)=>s+Math.round(o.total*.04),0);
  const cur=active[0];const dest=cur?.delivCoords||{lat:26.8571,lng:80.9903};
  return(
    <div style={{minHeight:"calc(100vh - 96px)",background:C.wh,display:"flex",flexDirection:"column"}}>
      <SyncBanner flash={syncFlash}/>
      <div style={{background:C.whCard,borderBottom:"1px solid "+C.whBorder,padding:mob?"12px 14px":"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:32}}>{driver.icon}</span><div><b style={{color:C.tealM,fontSize:14}}>{driver.name}</b><div style={{color:C.whMuted,fontSize:11}}>{driver.vehicle} - {driver.vno}</div></div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setOnline(v=>!v)} style={{background:online?"#14532d":"#1c1917",border:"1.5px solid "+(online?C.green:"#57534e"),borderRadius:20,padding:"6px 12px",color:online?C.green:"#57534e",fontSize:12,fontWeight:700,cursor:"pointer"}}>{online?"Online":"Offline"}</button>
          <button onClick={onLogout} style={{background:C.wh,border:"1px solid "+C.whBorder,color:C.whMuted,borderRadius:8,padding:"6px 10px",fontSize:11,cursor:"pointer"}}>Exit</button>
        </div>
      </div>
      <div style={{background:C.whCard,borderBottom:"1px solid "+C.whBorder,padding:"10px 16px",display:"flex",gap:mob?16:28,flexShrink:0}}>
        {[["Active",active.length],["Done",done.length],["Earned",fmt(earnings)],["Rating",driver.rating]].map(([l,v])=>(
          <div key={l} style={{textAlign:"center"}}><div style={{color:C.tealM,fontWeight:800,fontSize:mob?16:20}}>{v}</div><div style={{color:C.whMuted,fontSize:9}}>{l}</div></div>
        ))}
      </div>
      <div className="hs" style={{background:C.whCard,borderBottom:"1px solid "+C.whBorder,padding:"0 16px",display:"flex",gap:20,overflowX:"auto",flexShrink:0}}>
        {[["orders","My Orders"],["map","Navigate"],["earnings","Earnings"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",color:tab===k?C.tealM:C.whMuted,cursor:"pointer",padding:"12px 4px",fontSize:mob?11:13,fontWeight:600,borderBottom:tab===k?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:mob?"12px 10px":"18px 24px",maxWidth:800,margin:"0 auto",width:"100%"}}>
        {tab==="orders"&&(
          <div>
            {myOrders.length===0&&(<div style={{textAlign:"center",padding:"60px 20px",color:C.whMuted}}><div style={{fontSize:48,marginBottom:12}}>📭</div><div style={{fontSize:15,fontWeight:700}}>No orders assigned yet</div><div style={{fontSize:13,marginTop:6,color:"#1e4a44"}}>Warehouse assigns orders to you. Stay online!</div></div>)}
            {active.map(o=>(
              <div key={o.id} style={{background:C.whCard,borderRadius:14,padding:16,marginBottom:12,border:"2px solid "+C.teal}}>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
                  <span style={{color:C.amber,fontFamily:"monospace",fontWeight:800}}>{o.id}</span>
                  <Tag label={o.status} color={SCOL[o.status]}/>
                  <Tag label="YOUR DELIVERY" color={C.teal}/>
                </div>
                <b style={{color:C.tealM,fontSize:15}}>{o.customerName}</b>
                <div style={{color:C.whMuted,fontSize:12}}>Tel: {o.phone}</div>
                <div style={{color:C.whMuted,fontSize:12}}>Address: {o.deliveryAddress}</div>
                <div style={{color:C.whMuted,fontSize:12}}>{o.items.length} items - <span style={{color:C.amber,fontWeight:700}}>{fmt(o.total)}</span></div>
                <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
                  <a href={"tel:"+o.phone} style={{background:C.teal,color:"#fff",padding:"8px 14px",borderRadius:10,textDecoration:"none",fontSize:13,fontWeight:700}}>Call Customer</a>
                  <button onClick={()=>onDelivered(o.id)} style={{background:C.green,color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Mark Delivered</button>
                </div>
              </div>
            ))}
            {done.map(o=>(<div key={o.id} style={{background:C.whCard,borderRadius:12,padding:12,marginBottom:8,border:"1px solid "+C.whBorder,opacity:.65}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><span style={{color:C.whMuted,fontFamily:"monospace",fontSize:12}}>{o.id}</span><div style={{color:"#3d6b65",fontSize:11}}>{o.customerName} - {fmt(o.total)}</div></div>
                <Tag label="Delivered" color={C.green}/>
              </div>
            </div>))}
          </div>
        )}
        {tab==="map"&&(
          <div>
            <h3 style={{color:C.tealM,fontFamily:"'Oswald',sans-serif",marginBottom:12,fontSize:20}}>NAVIGATION</h3>
            {cur?<TrackMap wh={warehousePt} driver={driver} dest={dest} height={mob?300:420}/>
              :<LMap id={"dm"+driver.id} center={{lat:driver.lat,lng:driver.lng}} zoom={13} markers={[{lat:driver.lat,lng:driver.lng,icon:driver.icon,color:C.teal,sz:40,title:"Your Location",sub:driver.vehicle,open:true},{lat:warehousePt.lat,lng:warehousePt.lng,icon:"🏭",color:"#f59e0b",sz:36,title:"Warehouse"}]} height={mob?280:380} dark={true}/>}
            {cur&&(<div style={{background:C.whCard,borderRadius:12,padding:14,marginTop:12,border:"1px solid "+C.whBorder}}>
              <b style={{color:C.tealM,fontSize:14,display:"block",marginBottom:4}}>Active Delivery</b>
              <div style={{color:C.whMuted,fontSize:12}}>Address: {cur.deliveryAddress}</div>
              <div style={{color:C.whMuted,fontSize:12}}>Customer: {cur.customerName} - Tel: {cur.phone}</div>
              <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                <a href={"https://maps.google.com/?q="+dest.lat+","+dest.lng} target="_blank" rel="noreferrer" style={{background:"#1d4ed8",color:"#fff",padding:"8px 14px",borderRadius:10,textDecoration:"none",fontSize:13,fontWeight:700}}>Google Maps</a>
                <button onClick={()=>onDelivered(cur.id)} style={{background:C.green,color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Mark Delivered</button>
              </div>
            </div>)}
            {!cur&&<div style={{background:C.whCard,borderRadius:10,padding:12,marginTop:10,color:C.whMuted,fontSize:13,textAlign:"center"}}>Waiting for assignment...</div>}
          </div>
        )}
        {tab==="earnings"&&(
          <div>
            <h3 style={{color:C.tealM,fontFamily:"'Oswald',sans-serif",marginBottom:16,fontSize:20}}>EARNINGS</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
              {[["Today",fmt(earnings),C.amber],["Trips",done.length,C.teal],["Rating",driver.rating,C.green],["All-time",driver.trips,C.blue]].map(([l,v,cl])=>(
                <div key={l} style={{background:C.whCard,borderRadius:14,padding:16,border:"1px solid "+C.whBorder,textAlign:"center"}}>
                  <div style={{color:cl,fontWeight:800,fontSize:22,fontFamily:"'Oswald',sans-serif"}}>{v}</div>
                  <div style={{color:C.whMuted,fontSize:11}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{background:C.whCard,borderRadius:14,padding:16,border:"1px solid "+C.whBorder}}>
              <b style={{color:C.tealM,display:"block",marginBottom:10}}>Delivery Log</b>
              {done.length===0&&<div style={{color:"#1e4a44",fontSize:13}}>No deliveries yet</div>}
              {done.map(o=>(<div key={o.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.whBorder}}>
                <div><div style={{color:C.tealM,fontSize:12,fontFamily:"monospace"}}>{o.id}</div><div style={{color:C.whMuted,fontSize:11}}>{o.customerName}</div></div>
                <div style={{textAlign:"right"}}><div style={{color:C.amber,fontWeight:700,fontSize:13}}>+{fmt(Math.round(o.total*.04))}</div><div style={{color:"#1e4a44",fontSize:10}}>4% commission</div></div>
              </div>))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   ROOT APP
   orders, drivers, inventory use useSharedState()
   — writes to localStorage + broadcasts via BroadcastChannel
   — all open tabs receive updates instantly
══════════════════════════════════════════════════════ */
function App(){
  const mob=useIsMobile();
  const geo=useGeo();
  const warehousePt={lat:geo.lat,lng:geo.lng};

  /* SHARED STATE — syncs across all tabs automatically */
  const[orders,setOrders]=useSharedState("orders",[]);
  const[drivers,setDrivers]=useSharedState("drivers",INIT_DRIVERS);
  const[inventory,setInventory]=useSharedState("inventory",PRODUCTS.map(p=>({...p})));

  /* Flash indicator so users see when data arrived from another tab */
  const[syncFlash,setSyncFlash]=useState(false);
  useEffect(()=>{
    const bc=new BroadcastChannel("biltizo_sync_orders");
    const bc2=new BroadcastChannel("biltizo_sync_drivers");
    const flash=()=>{setSyncFlash(true);setTimeout(()=>setSyncFlash(false),2000);};
    bc.onmessage=flash; bc2.onmessage=flash;
    return()=>{bc.close();bc2.close();};
  },[]);

  /* LOCAL STATE — per-tab, no sync needed */
  const[portal,setPortal]=useState("customer");
  const[whLoggedIn,setWhLoggedIn]=useState(false);
  const[driverUser,setDriverUser]=useState(null);
  const[cart,setCart]=useState([]);
  const[view,setView]=useState("home");
  const[trackId,setTrackId]=useState(null);
  const[showCart,setShowCart]=useState(false);

  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const liveOrder=trackId?orders.find(o=>o.id===trackId):null;

  /* ── ACTIONS ── */
  const addCart=(product,delta)=>{
    setCart(c=>{
      const ex=c.find(i=>i.id===product.id);
      if(!ex)return delta>0?[...c,{...product,qty:product.min||1}]:c;
      const nq=ex.qty+(delta*(product.min||1));
      if(nq<=0)return c.filter(i=>i.id!==product.id);
      return c.map(i=>i.id===product.id?{...i,qty:nq}:i);
    });
  };

  const placeOrder=(form)=>{
    const order={
      id:mkId(),customerName:form.name,phone:form.phone,
      deliveryAddress:[form.address,form.area,form.pin].filter(Boolean).join(", "),
      delivCoords:form.delivCoords||{lat:26.8571,lng:80.9903},
      items:cart.map(i=>({...i})),total:form.total,
      status:"Pending",driverId:null,payment:form.pay||"cod",placedAt:nowT()
    };
    /* Deduct inventory (shared — other tabs will update too) */
    setInventory(inv=>inv.map(p=>{const ci=cart.find(i=>i.id===p.id);return ci?{...p,stock:Math.max(0,p.stock-ci.qty)}:p;}));
    /* Add order (shared — warehouse tab sees it instantly) */
    setOrders(prev=>[order,...prev]);
    setCart([]);setTrackId(order.id);setView("track");
  };

  const updateStatus=(orderId,newStatus)=>{
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,status:newStatus}:o));
  };

  const assignDriver=(orderId,driverId)=>{
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,driverId:driverId,status:"Dispatched"}:o));
    setDrivers(prev=>prev.map(d=>d.id===driverId?{...d,status:"busy"}:d));
  };

  const markDelivered=(orderId)=>{
    const order=orders.find(o=>o.id===orderId);
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,status:"Delivered"}:o));
    if(order&&order.driverId)setDrivers(prev=>prev.map(d=>d.id===order.driverId?{...d,status:"available"}:d));
  };

  const restockItem=(id,delta)=>setInventory(inv=>inv.map(p=>p.id===id?{...p,stock:Math.max(0,p.stock+delta)}:p));
  const switchPortal=p=>setPortal(p);

  /* ── WAREHOUSE PORTAL ── */
  if(portal==="warehouse"){return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <TopBar portal={portal} onSwitch={switchPortal}/>
      {!whLoggedIn
        ?<WHLogin onLogin={()=>setWhLoggedIn(true)} mob={mob}/>
        :<WHDash orders={orders} drivers={drivers} inventory={inventory} warehousePt={warehousePt} geoLabel={geo.label} onStatusChange={updateStatus} onAssignDriver={assignDriver} onRestock={restockItem} onLogout={()=>{setWhLoggedIn(false);switchPortal("customer");}} mob={mob} syncFlash={syncFlash}/>}
    </div>
  );}

  /* ── DRIVER PORTAL ── */
  if(portal==="driver"){return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <TopBar portal={portal} onSwitch={switchPortal}/>
      {!driverUser
        ?<DriverLogin drivers={drivers} onLogin={d=>setDriverUser(d)} mob={mob}/>
        :<DriverDash driver={drivers.find(d=>d.id===driverUser.id)||driverUser} orders={orders} warehousePt={warehousePt} onDelivered={markDelivered} onLogout={()=>{setDriverUser(null);switchPortal("customer");}} mob={mob} syncFlash={syncFlash}/>}
    </div>
  );}

  /* ── CUSTOMER PORTAL ── */
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Sync banner */}
      {syncFlash&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",zIndex:500,background:"#064e3b",color:"#6ee7b7",borderRadius:20,padding:"8px 20px",fontSize:12,fontWeight:700,boxShadow:"0 4px 20px rgba(0,0,0,.3)",whiteSpace:"nowrap"}}>
        Synced with other tabs!
      </div>}
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(240,253,249,.97)",backdropFilter:"blur(14px)",borderBottom:"1.5px solid "+C.border,padding:mob?"10px 14px":"12px 24px",paddingTop:mob?"max(10px, env(safe-area-inset-top))":"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div onClick={()=>setView("home")} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          <Logo sz={mob?26:32}/>
          <div>
            <div style={{color:C.teal,fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:mob?17:20,letterSpacing:.5}}>BILTIZO</div>
            {!mob&&<div style={{color:C.light,fontSize:10}}>Lucknow Construction Delivery</div>}
          </div>
        </div>
        {!mob&&(<div style={{display:"flex",gap:4}}>
          {[["home","Home"],["shop","Shop"],["history","My Orders"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?C.tealL:"none",color:view===v?C.teal:C.muted,border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>{l}</button>
          ))}
        </div>)}
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {!mob&&<>
            <button onClick={()=>switchPortal("warehouse")} style={{background:C.tealL,color:C.teal,border:"none",borderRadius:8,padding:"7px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Warehouse</button>
            <button onClick={()=>switchPortal("driver")} style={{background:"#fff7ed",color:C.orange,border:"none",borderRadius:8,padding:"7px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Driver Portal</button>
          </>}
          {liveOrder&&<button onClick={()=>setView("track")} style={{background:"#dcfce7",color:C.green,border:"none",borderRadius:8,padding:mob?"6px 8px":"7px 10px",fontSize:mob?11:12,fontWeight:700,cursor:"pointer"}}>📍 Track</button>}
          <button onClick={()=>{setView("shop");setShowCart(true);}} style={{background:cartCount>0?C.teal:C.tealL,color:cartCount>0?"#fff":C.teal,border:"none",borderRadius:10,padding:mob?"8px 12px":"8px 14px",fontSize:mob?13:14,fontWeight:800,cursor:"pointer",minHeight:38}}>
            {cartCount>0?"🛒 "+cartCount:"Cart"}
          </button>
        </div>
      </nav>
      <div style={{background:"linear-gradient(90deg,#b45309,#f59e0b)",padding:mob?"10px 14px":"11px 32px",display:"flex",gap:mob?14:32,overflowX:"auto",scrollbarWidth:"none"}}>
        {[["5% off (min Rs.2000)","BILTIZO5"],["Free delivery Rs.5000+","FREE5K"],["8% bulk discount","BULK8"]].map(([t,code])=>(
          <div key={code} style={{flexShrink:0,display:"flex",alignItems:"center",gap:7,color:"#fff"}}>
            <span style={{fontSize:mob?11:13,fontWeight:700}}>{t}</span>
            <span style={{background:"rgba(255,255,255,.25)",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:800,fontFamily:"monospace"}}>{code}</span>
          </div>
        ))}
      </div>
      {view==="home"&&(
        <>
          <Hero onShop={()=>setView("shop")} mob={mob}/>
          <div style={{maxWidth:1100,margin:"0 auto",padding:mob?"20px 10px":"36px 20px"}}>
            <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(3,1fr)",gap:mob?10:16,marginBottom:36}}>
              {[["2-4h Delivery","Same-day to your site"],["Live GPS Tracking","Real-time driver on map"],["50+ Materials","All construction needs"],["Any Load Size","Bikes to full trucks"],["Best Prices","No middlemen"],["24/7 Support","Always here"]].map(([t,d])=>(
                <div key={t} style={{background:C.card,borderRadius:14,padding:mob?14:18,border:"1.5px solid "+C.border}}>
                  <div style={{color:C.text,fontWeight:700,fontSize:mob?13:14,marginBottom:3}}>{t}</div>
                  <div style={{color:C.muted,fontSize:mob?11:12,lineHeight:1.5}}>{d}</div>
                </div>
              ))}
            </div>
            <div style={{textAlign:"center",background:"linear-gradient(135deg,"+C.teal+",#0ea5e9)",borderRadius:20,padding:mob?"28px 16px":"44px 40px"}}>
              <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:mob?26:38,color:"#fff",marginBottom:8}}>READY TO BUILD?</h2>
              <p style={{color:"rgba(255,255,255,.75)",marginBottom:22,fontSize:15}}>Order now, materials delivered today in Lucknow</p>
              <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
                <button onClick={()=>setView("shop")} style={{background:"#f59e0b",color:"#0d2926",border:"none",borderRadius:12,padding:mob?"12px 24px":"14px 36px",fontSize:mob?15:17,fontWeight:800,cursor:"pointer"}}>Browse Materials</button>
                <button onClick={()=>switchPortal("warehouse")} style={{background:"rgba(255,255,255,.2)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:12,padding:mob?"12px 18px":"14px 26px",fontSize:mob?14:16,fontWeight:700,cursor:"pointer"}}>Warehouse Login</button>
              </div>
            </div>
          </div>
        </>
      )}
      {view==="shop"&&<Shop cart={cart} addCart={addCart} mob={mob}/>}
      {view==="checkout"&&<Checkout cart={cart} onPlace={placeOrder} onBack={()=>{setView("shop");setShowCart(true);}} mob={mob}/>}
      {view==="history"&&<History orders={orders} onTrack={o=>{setTrackId(o.id);setView("track");}} mob={mob}/>}
      {view==="track"&&liveOrder&&<TrackOrder order={liveOrder} drivers={drivers} warehousePt={warehousePt} mob={mob}/>}
      {showCart&&<CartDrawer cart={cart} addCart={addCart} onClose={()=>setShowCart(false)} onCheckout={()=>{setShowCart(false);setView("checkout");}} mob={mob}/>}
      {mob&&(
        <div className="mob-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:"1.5px solid "+C.border,display:"flex",zIndex:99,boxShadow:"0 -4px 24px rgba(13,149,136,.15)"}}>
          {[
            ["🏠","Home","home",false],
            ["🛍️","Shop","shop",false],
            [cartCount>0?"🛒":"🛒",cartCount>0?"Cart "+cartCount:"Cart","cart",false],
            ["📋","Orders","history",false],
            ["📍","Track","track",false],
            ["🏭","WH","warehouse",false],
            ["🚛","Driver","driver",false]
          ].map(([icon,lbl,v])=>{
            const active=(v==="warehouse"&&portal==="warehouse")||(v==="driver"&&portal==="driver")||(portal==="customer"&&view===v)||(v==="cart"&&showCart);
            return(
            <button key={v} onClick={()=>{if(v==="cart"){setView("shop");setShowCart(true);}else if(v==="warehouse")switchPortal("warehouse");else if(v==="driver")switchPortal("driver");else setView(v);}}
              style={{flex:1,background:active?C.tealL+"88":"none",border:"none",borderTop:active?"2px solid "+C.teal:"2px solid transparent",padding:"7px 1px 6px",cursor:"pointer",color:active?C.teal:C.light,display:"flex",flexDirection:"column",alignItems:"center",gap:1,minHeight:52,transition:"all .15s"}}>
              <span style={{fontSize:17,lineHeight:1.2}}>{icon}</span>
              <span style={{fontSize:9,fontWeight:700,whiteSpace:"nowrap",letterSpacing:.2}}>{lbl}</span>
            </button>
          );})}
        </div>
      )}
      {mob&&<div style={{height:"calc(52px + env(safe-area-inset-bottom, 0px))"}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
